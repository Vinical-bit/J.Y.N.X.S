<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compras</title>

    <style>
        header{
            background-color: rgba(128, 128, 128, 0.636);
            border-radius: 5px;

        }
        header:hover{
            background-color: rgba(195, 31, 31, 0.747);
            transition: background-color 0.5s;
        }
        h1{
            text-align: center;
            color: rgba(13, 0, 255, 0.603);
        }
        a{
            text-decoration: none;
        }
        div.mae{
            display: grid;
            grid-auto-rows: 1fr;
            grid-template-columns: auto auto;
            grid-auto-flow: row;
        }
        div.prod{
            justify-content: center;
            border: 1px solid black;
             display: grid;
            justify-content: center;
            justify-items: center;
        }
        .prod > img{
            width: 70%;
            padding: 10px;
            filter: drop-shadow(2px 2px 10px rgba(0, 0, 0, 0.436));
        }

        button{
            height: 30px;
            border-radius: 3px;
            
        }
    </style>
</head>
<body>
    <header>
        <h1>Os melhores produtos aqui</h1>
    </header>
    <div class="mae">
        <div class="prod">
            <img src="https://www.iplace.com.br/ccstore/v1/images/?source=/file/v53600474050019872/products/100072445.00.639062315413430493-apple-iphone-17.jpg&height=300&width=300" alt="iphone 17">
            <a href="http://https://www.iplace.com.br/apple-iphone-17/100435PR" target="_blank" rel="noopener noreferrer">iphone 17</a>
            <p><strong>R$ 5.999,00</strong></p>

            <button>
                <a href="http://https://www.iplace.com.br/apple-iphone-17/100435PR" target="_blank" rel="noopener noreferrer">Comprar</a>
            </button>
        </div>
        <div class="prod">
            <img src="https://www.apple.com/assets-www/en_WW/mac/04_product_tile/large/mbp_14_16_028335cc2_2x.jpg" alt="macbook-pro">
            <a href="http://https://www.apple.com/br/macbook-pro/" target="_blank" rel="noopener noreferrer">Mac book pro</a>

            <p><strong>R$54.999,00</strong></p>

            <button>
                <a href="http://https://www.amazon.com.br/Apple-MacBook-polegadas-18-core-unificada/dp/B0GR1Y8813/ref=asc_df_B0GR1Y8813?tag=brbngshpdsk-20&linkCode=df0&hvadid=77309628250048&hvnetw=o&hvqmt=e&hvbmt=be&hvdev=c&hvlocint=&hvlocphy=293382&hvtargid=pla-4580909061182049&psc=1&msclkid=6a5669178efc185ce4cb00eb0303be5c" target="_blank" rel="noopener noreferrer">Comprar</a>
            </button>
        </div>
        <div class="prod">
            <img src="https://th.bing.com/th/id/R.a299bd2e74703ac21cf88e34a6d4a039?rik=HYImm2PQ%2fZ91tQ&pid=ImgRaw&r=0" alt="Mercedes">
            <a href="https://sp.olx.com.br/sao-paulo-e-regiao/autos-e-pecas/carros-vans-e-utilitarios/mercedes-benz-c-300-amg-line-eq-boost-2-0-tb-aut-2022-1499440875?lis=listing_2020" target="_blank" rel="noopener noreferrer">Mercedes-benzs</a>

            <p><strong>R$ 294.950</strong></p>

            <button>
                <a href="https://sp.olx.com.br/sao-paulo-e-regiao/autos-e-pecas/carros-vans-e-utilitarios/mercedes-benz-c-300-amg-line-eq-boost-2-0-tb-aut-2022-1499440875?lis=listing_2020" target="_blank" rel="noopener noreferrer">Comprar</a>
            </button>

            <img src="img/car-model-8066718_1280-removebg-preview.png" alt="">

        </div>
    </div>
</body>
</html>
